# ===============================
# SERVER CONFIG
# ===============================
server.port=8080


# ===============================
# APPLICATION NAME
# ===============================
spring.application.name=article-navigator


# ===============================
# LOGGING (helps debugging)
# ===============================
logging.level.org.springframework=INFO
logging.level.com.sanaa.articlenavigation=DEBUG


# ===============================
# JACKSON (JSON handling)
# ===============================
spring.jackson.property-naming-strategy=SNAKE_CASE


# ===============================
# TIMEOUT CONFIG (important for Python calls)
# ===============================
spring.mvc.async.request-timeout=5000